# BFSI Industry Overview for Data Solution Architects

## Overview

Banking, Financial Services, and Insurance (BFSI) is one of the most data-intensive industries on the planet. Every transaction, trade, policy, claim, and customer interaction produces structured and unstructured data — and regulators demand that most of it be retained, auditable, and reportable for years. This is the industry where data platforms win or lose on trust, latency, compliance, and scale simultaneously.

As a Data Solution Architect, your job is not to become a banker. Your job is to understand *why* the data exists, *who* depends on it, and *what happens if it's wrong or late*. A 30-minute payment delay in retail banking is a customer complaint. In capital markets, a 30-millisecond delay in trade data is a P&L event.

This course covers the major segments of BFSI, the data that flows through each, and how a modern data platform (cloud data warehouse, lakehouse, streaming pipeline) maps onto real financial business problems.

## The Major Segments

### Retail Banking
Consumer-facing banking: checking accounts, savings, mortgages, personal loans, credit cards. Highest data volume by transaction count. Key data concerns: fraud detection, 360-degree customer view, regulatory reporting (AML, KYC), and personalization.

### Corporate & SME Banking
Banking services for businesses: trade finance, cash management, treasury, FX, working capital lending. Data is lower volume but higher value per record. Key concerns: counterparty risk, real-time cash position, covenant monitoring.

### Capital Markets
Trading of equities, fixed income, derivatives, and commodities. Extremely latency-sensitive. Generates massive tick data volumes. Key concerns: trade surveillance, P&L calculation, risk exposure, regulatory reporting (MiFID II, Dodd-Frank).

### Insurance (P&C and Life)
Property & Casualty covers cars, homes, commercial property. Life covers mortality, health, and long-term savings. Data concerns: underwriting (pricing risk), claims processing, fraud detection, and actuarial modeling.

### Wealth & Asset Management
Investment advisory and portfolio management for individuals and institutions. Data concerns: portfolio performance, fee calculation, regulatory suitability reporting, client onboarding (KYC).

### Retirement & Pensions
Defined benefit (DB) and defined contribution (DC) pension schemes. Long-horizon data — participant records may span 40+ years. Key concerns: actuarial valuation, benefit calculation, regulatory reporting, and member communication. Covered in detail in Section 09.

## Why BFSI Is Different for Data Architects

| Dimension | What it means for your data platform |
|-----------|--------------------------------------|
| **Regulation** | Data lineage, auditability, and retention are non-negotiable. GDPR, BCBS 239, MiFID II, Solvency II all impose specific data requirements |
| **Latency spectrum** | Same institution may need millisecond streaming (fraud) and overnight batch (regulatory reports) — both on the same data |
| **Data sensitivity** | PII, financial transaction data, and health data (for insurance) all co-exist — fine-grained access control is essential |
| **Legacy systems** | Most banks run 20-40 year old core banking systems. Your platform must ingest from mainframes and flat files, not just modern APIs |
| **M&A complexity** | Banks acquire other banks. Data consolidation across incompatible systems is a recurring workload |

## Key Regulatory Bodies & Frameworks to Know

| Framework | Region | Relevance to Data |
|-----------|--------|-------------------|
| **BCBS 239** | Global (Basel Committee) | Defines standards for risk data aggregation — directly drives data architecture decisions at large banks |
| **MiFID II** | EU | Requires trade reporting, best execution data, and transaction record-keeping for capital markets |
| **GDPR / CCPA** | EU / California | Right to erasure and data minimization — conflicts with long retention requirements, must be designed for |
| **AML / KYC** | Global | Anti-money laundering and Know Your Customer — requires transaction monitoring pipelines and entity resolution |
| **DORA** | EU (from 2025) | Digital Operational Resilience Act — imposes data recovery and incident reporting requirements on financial firms |
| **Solvency II** | EU | Insurance capital requirements — drives actuarial data models and reporting pipelines |

## How Data Platforms Map to BFSI Value

The conversation you will have with most BFSI customers is not "what is a data lakehouse." It is one of these:

- **"We can't produce our regulatory report on time"** → Data lineage, orchestration, and governed data products
- **"We have fraud losses we can't explain"** → Real-time streaming + ML feature store
- **"Our risk team can't see our exposure across all our books"** → Data consolidation, semantic layer, single source of truth
- **"We're migrating off our mainframe"** → CDC ingestion, schema mapping, parallel-run validation
- **"We acquired a bank and need to merge data"** → Data catalog, entity resolution, master data management

Knowing which segment your customer is in tells you which of these conversations you are about to have.

# Retail Banking Products & Data Flows

## Overview

Retail banking is the most recognizable segment of the financial industry — it is the bank branch on the high street, the mobile app, the credit card statement. For a Data SA, retail banking is also the segment with the highest transaction volume, the richest behavioral data, and the most mature regulatory requirements around customer data.

Understanding retail banking products matters because each product generates a distinct data shape and sits at a different stage of the customer lifecycle. When a bank says "we want a 360-degree customer view," they mean they want all of these product data streams joined together on a single customer identity.

## Core Retail Banking Products

### Current / Checking Accounts
The primary transaction account. Every debit card purchase, direct debit, standing order, and bank transfer flows through here. This is the highest-frequency data source in retail banking — a mid-size bank processes millions of transactions per day.

**Data characteristics:** High volume, append-only transaction ledger, real-time fraud scoring required, regulatory retention typically 7 years.

### Savings & Deposit Accounts
Interest-bearing accounts where customers hold idle cash. Lower transaction frequency than current accounts but critical for liability management (banks use deposit data to model how much cash they need on hand).

**Data characteristics:** Lower volume, interest accrual calculations run nightly batch, customer lifetime value modeling depends heavily on deposit balances.

### Mortgages & Home Loans
Long-tenure secured loans (15–30 years) collateralized by property. Origination generates a large documentation data payload (income verification, credit check, property valuation). Post-origination, the data is relatively quiet — monthly repayments, occasional restructuring events.

**Data characteristics:** Document-heavy at origination (unstructured + structured), long retention requirement, credit risk models need property value feeds and macroeconomic data as inputs.

### Personal Loans & Auto Loans
Unsecured or asset-backed consumer lending. Shorter tenure than mortgages (1–7 years). Higher interest rates, higher default risk. Origination is heavily automated via credit scoring pipelines.

**Data characteristics:** Credit bureau data ingestion at origination, behavioral scoring during the loan lifecycle (early arrears signals), collections workflow data at end of life.

### Credit Cards
Revolving credit product. Generates the richest behavioral data in retail banking — every merchant, every purchase category, every repayment behavior is recorded. The basis for most retail banking fraud models and customer segmentation.

**Data characteristics:** High cardinality transaction data (merchant codes, geolocation, device), near-real-time fraud scoring (milliseconds), spend analytics, authorization vs. settlement reconciliation.

## The Retail Banking Data Lifecycle

```
Customer Onboarding → Product Application → Account Opening → Transacting → Servicing → Retention/Churn
       ↓                      ↓                   ↓               ↓              ↓              ↓
   KYC/AML data          Credit decision       Core banking     Ledger data    Call center    ML churn
   Identity docs          Bureau data          system record    Card txns      CRM events     scoring
```

## Key Data Domains in Retail Banking

| Domain | What it contains | Why it matters to SAs |
|--------|-----------------|----------------------|
| **Customer Master** | Name, address, identity documents, relationship history | The glue between all product data — entity resolution is hard when customers exist across 5+ systems |
| **Transaction Ledger** | Every debit/credit event with timestamp, amount, counterparty | Source of truth for balance calculations, fraud, and regulatory reporting |
| **Product Register** | All open accounts/loans/cards with their terms | Needed for customer 360, regulatory reporting (CCAR, stress testing) |
| **Credit Bureau Data** | External credit scores and tradelines ingested at origination | Third-party data — refresh cadence and licensing matter for data architecture |
| **Behavioral / Interaction Data** | Mobile app events, branch visits, call center logs | Powers personalization and churn models — typically lives in a separate digital data layer |

## Common Customer Problems You Will Hear

**"We can't join our mortgage data with our current account data"**
Classic multi-system problem. Core banking system for deposits, a loan origination system for mortgages, a card processing platform for credit cards — each with its own customer ID. The data platform needs a master data management or entity resolution layer.

**"Our fraud model is reacting too slowly"**
Batch fraud scoring (run overnight) catches fraud after the fact. The ask is to move to real-time feature computation on the transaction stream. This is a streaming pipeline + ML feature store conversation.

**"We need to report all transactions over €10,000 to the regulator by 9am"**
AML transaction monitoring. The data pipeline needs to be reliable, fast, and have clear lineage so the compliance team can explain exactly where each number came from.

**"We want to show customers their spending insights in the app"**
Merchant category enrichment + near-real-time aggregation. Requires transaction data to be available to the API layer within seconds of the transaction being posted.

## What "Real-Time" Actually Means Here

Retail banking has several distinct latency tiers — make sure you clarify with the customer which one they mean:

| Tier | Latency | Use case |
|------|---------|----------|
| **Authorization-time** | < 200ms | Fraud scoring on card swipe |
| **Near-real-time** | Seconds to minutes | Spending notifications, balance updates |
| **Intraday batch** | Every 1–4 hours | Risk dashboards, treasury position |
| **End-of-day batch** | Overnight | Regulatory reporting, interest accrual, GL reconciliation |

# Corporate & SME Banking

## Overview

Corporate and SME banking serves businesses rather than individuals. The products are structurally similar to retail — loans, accounts, payments — but the scale per customer is orders of magnitude larger, the relationships are more complex, and the data is richer with counterparty and contractual detail.

A mid-market corporate customer might have a revolving credit facility, multiple foreign currency accounts, trade finance instruments, interest rate swaps, and a cash pooling arrangement — all generating data that needs to be consolidated into a single relationship view so the bank can manage its exposure and the relationship manager can have an informed conversation.

For Data SAs, corporate banking is interesting because the data volumes are lower but the data *complexity* is higher. Getting the data model right matters more than getting the pipeline throughput right.

## Core Corporate Banking Products

### Commercial Loans & Credit Facilities
Term loans and revolving credit facilities (RCFs) to businesses. An RCF works like a corporate credit card — the customer can draw down and repay within an agreed limit. Banks track utilization daily to manage their capital requirements.

**Data characteristics:** Covenant tracking (financial ratios the borrower must maintain), drawdown and repayment events, collateral register, credit rating changes.

### Cash Management & Transaction Banking
The operational banking services that keep a business running day-to-day: business current accounts, payroll processing, supplier payments, and collections. This is the "sticky" product — once a corporate's ERP system is integrated with the bank's payment rails, switching is painful.

**Data characteristics:** High-value, lower-frequency transactions compared to retail. SWIFT message data (MT/MX formats), virtual account structures, intraday liquidity reporting.

### Trade Finance
Products that facilitate international trade: Letters of Credit (LC), Documentary Collections, Bank Guarantees, and Supply Chain Finance. Each instrument involves multiple parties (importer bank, exporter bank, shipping company) and has a document-heavy lifecycle.

**Data characteristics:** Unstructured document data (bills of lading, invoices), multi-party workflows, sanctions screening at every step, long settlement cycles (30–120 days).

### Foreign Exchange (FX) & Treasury
Banks offer FX conversion and hedging products (spot, forward, options) to help corporates manage currency risk. Treasury products extend to interest rate swaps and commodity hedging.

**Data characteristics:** Market data dependency (real-time FX rates), trade blotter, mark-to-market valuations, counterparty exposure netting.

### Supply Chain Finance (SCF)
The bank sits between a large buyer and its suppliers, paying suppliers early (at a discount) and collecting from the buyer on the original invoice due date. Also called "reverse factoring."

**Data characteristics:** Invoice data ingestion from buyer ERP systems, dynamic discounting calculations, supplier onboarding data.

## Key Data Challenges in Corporate Banking

### Counterparty Hierarchy
A corporate customer is rarely a single legal entity — it is a group of subsidiaries, holding companies, and special purpose vehicles. The bank needs to understand the *legal entity hierarchy* to correctly aggregate exposure across the group.

This is a graph data problem. Banks use Legal Entity Identifier (LEI) data from GLEIF as a reference dataset to map corporate structures.

### Covenant Monitoring
A loan agreement typically requires the borrower to maintain certain financial ratios (e.g., Debt/EBITDA < 4x). The bank needs to ingest the borrower's financial statements periodically and compute whether covenants are being met. Breach triggers an early warning process.

**SA conversation:** This is often a manual Excel-based process the bank wants to automate — a clear data pipeline + rules engine opportunity.

### Intraday Liquidity
Regulators (BCBS 248) require large banks to monitor and report their intraday liquidity position in near-real-time. The bank needs to aggregate all expected inflows and outflows across all nostro accounts throughout the day.

This is a genuine streaming + real-time aggregation problem. Banks that are still doing this in batch are out of compliance.

### KYC for Corporates (KYB)
Know Your Business (KYB) is more complex than retail KYC. The bank must verify the beneficial owners (any individual with >25% ownership), directors, and the legitimacy of the business. For a multinational with a complex holding structure, this is a multi-week data gathering exercise.

**Data platform angle:** Entity resolution, document management, and workflow orchestration — a good opportunity for graph databases and document AI.

## Data Sources Unique to Corporate Banking

| Source | What it contains |
|--------|-----------------|
| **SWIFT Network** | Interbank payment messages (MT103, MT202, ISO 20022 MX format) |
| **GLEIF / LEI Registry** | Legal entity hierarchy and ownership data |
| **ERP Integration** | SAP/Oracle financial data from corporate customers (for SCF and covenant monitoring) |
| **Credit Rating Agencies** | Moody's, S&P, Fitch ratings and watch-list changes |
| **Trade Registries** | Company filings, director data, UBO (Ultimate Beneficial Owner) data |

## Common Customer Problems You Will Hear

**"Our relationship managers don't have a single view of the client"**
Data is spread across a loan origination system, a treasury system, a trade finance platform, and the CRM. A data platform with a consolidated client data model and semantic layer solves this.

**"We're failing our intraday liquidity reporting"**
A batch-based data architecture cannot support intraday liquidity monitoring. The conversation is about streaming ingestion from payment systems and real-time aggregation.

**"Our covenant monitoring is manual and we miss breaches"**
An opportunity for a data pipeline that ingests borrower financials (structured or unstructured) and runs covenant calculations automatically, with alerting.

# Payments & Clearing

## Overview

Payments is the plumbing of the financial system. Every time money moves — a card tap at a coffee shop, a payroll run, an international wire — it travels through a payments infrastructure made up of payment rails, clearing houses, and settlement systems. For a Data SA, payments is important because it generates some of the highest-volume, most latency-sensitive data in all of BFSI.

The payments landscape is also undergoing rapid change. The shift from batch overnight settlement to real-time payment (RTP) rails in most major markets means that data architectures built for end-of-day batch processing are being replaced with streaming-first designs.

## How Payments Work: The Core Concepts

### The Payment Journey
Every payment has three logical phases:

1. **Initiation** — The payer instructs their bank to send money (via card swipe, bank transfer, direct debit mandate)
2. **Clearing** — The payment message is exchanged between the paying bank and the receiving bank through a central clearing house or bilateral agreement
3. **Settlement** — The actual movement of funds between bank accounts at the central bank (or a correspondent bank) — this is where money actually changes hands

Clearing and settlement used to happen once per day. Real-time payment rails have collapsed this to seconds.

### Gross vs. Net Settlement
- **Gross settlement (RTGS):** Each payment settles individually and immediately. Used for high-value payments (central bank systems like Fedwire, CHAPS, TARGET2). Eliminates settlement risk but requires banks to hold more liquidity.
- **Net settlement:** Thousands of payments are accumulated and netted — only the net position between banks is settled at end of day. Used for card networks, ACH, BACS. More capital-efficient but introduces intraday settlement risk.

## Major Payment Rails

| Rail | Region | Type | Use case |
|------|--------|------|----------|
| **SWIFT** | Global | Messaging network | Cross-border bank transfers (not a settlement system — just the messaging layer) |
| **SEPA** (SCT, SCT Inst) | EU | Credit transfer | EUR payments within Europe; Inst = real-time |
| **Faster Payments / FPS** | UK | Real-time | Account-to-account payments, 24/7 |
| **ACH / Nacha** | USA | Batch net settlement | Payroll, direct debits |
| **FedNow** | USA | Real-time | Launched 2023 — US real-time payment rail |
| **UPI** | India | Real-time | Unified Payments Interface — world's largest RTP volume |
| **Visa / Mastercard** | Global | Card network | Authorization, clearing, and settlement for card payments |
| **CHAPS** | UK | RTGS gross | High-value same-day GBP settlements |

## Card Payments: The Data Flow

Card payments have their own ecosystem worth understanding separately because of their data richness and the number of parties involved.

```
Cardholder → Merchant → Acquirer → Card Network (Visa/MC) → Issuer → Cardholder's account
```

**Key data events:**
- **Authorization:** Real-time approval (< 200ms). Fraud model fires here. Authorization data includes merchant category code (MCC), amount, card BIN, terminal ID, geolocation.
- **Clearing:** Next-day batch. Full transaction detail is exchanged between acquirer and card network.
- **Settlement:** Funds move from the issuer's settlement account to the acquirer's account via the card network.
- **Reconciliation:** The merchant reconciles what was authorized vs. what was settled, and disputes any gaps (chargebacks).

**Data SA note:** Authorization data and settlement data are different records that must be reconciled. They travel on different timelines and often live in different systems. Reconciliation discrepancies are a real data quality problem.

## ISO 20022: The New Payment Data Standard

ISO 20022 is a global messaging standard that is replacing older formats (SWIFT MT, BACS, SEPA legacy) across virtually every major payment rail. The migration is largely complete or underway in most markets.

**Why it matters for data architects:**
- ISO 20022 messages carry significantly richer data than the formats they replace — full remittance information, LEI codes, purpose codes, and structured address fields
- This richer data enables better fraud detection, AML screening, and straight-through processing
- Banks migrating to ISO 20022 need to transform their data pipelines to parse and store the new message format while maintaining backwards compatibility with legacy systems

## Payment Data Characteristics

| Characteristic | Detail |
|---------------|--------|
| **Volume** | Top-tier banks process millions of transactions per day across all rails |
| **Latency requirement** | Fraud scoring at authorization: < 200ms. Real-time payment notification: seconds. |
| **Retention** | Typically 7–10 years for regulatory purposes |
| **Sensitivity** | Account numbers, sort codes, beneficiary details — all PII or financially sensitive |
| **Format variety** | SWIFT MT, ISO 20022 XML, fixed-width flat files, JSON APIs — all from different rails |

## Common Customer Problems You Will Hear

**"We need real-time fraud detection on payments"**
The bank is processing payments through a batch pipeline. The ask is to move authorization-time scoring to a streaming architecture with a sub-200ms response. This is a Kafka/Flink + ML feature store conversation.

**"We can't reconcile our card settlement data with our authorization data"**
Authorization and settlement records are on different systems, different formats, different timelines. A unified data platform with a payment reconciliation data model solves this.

**"We're migrating to ISO 20022 and need to transform our pipeline"**
Schema transformation at ingestion — the new richer fields need to be parsed, mapped to the internal data model, and made available to downstream consumers (fraud, AML, reporting) without disrupting existing flows.

**"We want to give customers real-time payment notifications"**
Payment events need to be available to the customer-facing API within seconds of posting. This is a streaming pipeline with a low-latency serving layer (e.g., a key-value store or stream-to-API pattern).

**"We process payments in 12 countries and can't see our total flow"**
Multi-region payment data consolidation. Different currencies, different rails, different formats — the data platform needs currency normalization, timezone handling, and a unified payment data model.

# Capital Markets & Trade Data

## Overview

Capital markets is where securities — stocks, bonds, derivatives, commodities — are bought and sold. It is the segment of BFSI most associated with high-speed data, quant models, and large technology investments. It is also the segment where data latency has the most direct financial consequence: being a millisecond late on a trade can mean missing a price, and being wrong on a risk calculation can mean understating exposure by millions.

As a Data SA, capital markets conversations are usually about one of three things: getting market data in fast and reliably, calculating risk and P&L accurately across a large portfolio, or satisfying a regulator who wants a complete audit trail of every trade.

## Key Market Segments

### Equities
Shares in publicly listed companies. Traded on exchanges (NYSE, LSE, Euronext) and over-the-counter (OTC). Generates tick data (every price update) at extremely high frequency during market hours.

### Fixed Income
Bonds — debt instruments issued by governments (gilts, treasuries) and corporations. More complex than equities because bonds have a maturity date, a coupon schedule, and a credit rating that changes over time. Largely OTC market, so pricing is less transparent than equities.

### Derivatives
Contracts whose value is derived from an underlying asset (equity, rate, FX, commodity). Include options, futures, swaps, and forwards. Derivatives can be exchange-traded (standard contracts) or OTC (bespoke). OTC derivatives generate complex data requirements because the terms of each contract are unique.

### Foreign Exchange (FX)
The largest market in the world by volume (~$7.5 trillion/day). Spot, forward, and swap transactions. Banks act as market makers, quoting bid/offer prices continuously.

### Commodities
Oil, gas, metals, agricultural products. Traded on exchanges (CME, ICE) and OTC. Banks with commodities desks need market data feeds from commodity exchanges alongside their financial data.

## The Trade Lifecycle

Every trade goes through a sequence of stages from agreement to final settlement. Data is produced and consumed at each stage:

```
Pre-Trade → Execution → Post-Trade → Settlement → Accounting
    ↓            ↓            ↓            ↓            ↓
Market data   Trade blotter  Confirmation  CSD/CCP     GL entry
Risk limits   Order book     Matching      Netting     P&L calc
Analytics     FIX messages   Affirmation   Fails mgmt  Regulatory
```

**Key stages explained:**
- **Execution:** Trade is agreed (price, quantity, counterparty). Captured in the trade blotter. FIX protocol is the standard messaging format for electronic trading.
- **Confirmation/Matching:** Both sides confirm they agree on the trade terms. Mismatches (breaks) must be resolved quickly.
- **Clearing:** For exchange-traded products, a Central Counterparty (CCP) like LCH or CME Clearing steps between buyer and seller, taking on counterparty credit risk. Requires margin to be posted.
- **Settlement:** Securities and cash are exchanged, typically T+1 or T+2 days after trade. Happens through a Central Securities Depository (CSD) like Euroclear or DTCC.

## Market Data

Market data is the lifeblood of capital markets. It comes in multiple tiers:

| Type | Description | Latency | Volume |
|------|-------------|---------|--------|
| **Tick data** | Every price update for a security | Microseconds | Extremely high |
| **Level 1** | Best bid/offer and last trade price | Milliseconds | High |
| **Level 2 / Order book** | Full depth of the order book | Milliseconds | Very high |
| **Reference data** | Static attributes of securities (ISIN, CUSIP, rating, sector) | Daily | Low volume, high importance |
| **Corporate actions** | Dividends, stock splits, rights issues | Event-driven | Low but critical |

**Data SA note:** Reference data is often the most painful problem. A security might have a different identifier on every system (ISIN, CUSIP, SEDOL, Bloomberg ticker, Reuters RIC). Maintaining a consistent security master across all downstream systems is a major data management challenge.

## Risk & P&L Data

The most critical daily output for a trading desk is its P&L (Profit and Loss) — how much money did we make or lose today? And its risk reports — how much could we lose if the market moves against us?

**Key risk measures:**
- **VaR (Value at Risk):** The maximum loss expected with X% confidence over Y days. Regulatory capital is partly based on VaR.
- **Greeks (Delta, Gamma, Vega, Theta):** Sensitivities of a derivatives position to changes in market variables. Computed per position, aggregated across portfolios.
- **Counterparty Credit Exposure:** If a counterparty defaults on an OTC derivative, what is the bank's expected loss?
- **Stress Testing / Scenario Analysis:** What happens to the portfolio if the market crashes 20%? Required by regulators (CCAR in the US, ICAAP in the EU).

P&L and risk calculations require joining trade data, market data, and reference data — often across multiple asset classes and booking systems. This is a complex data integration problem.

## Regulatory Reporting in Capital Markets

Capital markets is one of the most heavily regulated data environments:

| Regulation | Jurisdiction | Data Requirement |
|-----------|-------------|-----------------|
| **MiFID II / MiFIR** | EU | Trade reporting to regulators within 15 minutes of execution; transaction reporting T+1 |
| **EMIR** | EU | OTC derivative reporting to trade repositories |
| **Dodd-Frank / CFTC** | USA | Swap data reporting |
| **FRTB** | Global | Fundamental Review of the Trading Book — new internal models for market risk capital; very data-intensive |
| **Basel III / IV** | Global | Capital adequacy — requires granular trade and exposure data |

**SA conversation:** Many banks have reporting pipelines that are fragile, manual, or late. The business case for a modern data platform is often built on regulatory compliance risk reduction.

## Common Customer Problems You Will Hear

**"Our end-of-day P&L takes 6 hours to compute and trading can't see their numbers until midnight"**
This is a data pipeline performance and architecture problem. Usually caused by sequential processing on a legacy system. The conversation is about parallelization, columnar storage, and in-memory computation.

**"We have 12 different systems that each have a different version of the trade"**
Trade data fragmentation across front-office, middle-office, and back-office systems. A golden source trade data store (often called a "trade data hub") is the solution.

**"We're failing our MiFID II transaction reporting SLA"**
The reporting pipeline is too slow or breaks when volume spikes. Reliability, observability, and latency improvements on the reporting pipeline.

**"Our risk team can't see our exposure across equity and fixed income positions"**
Cross-asset risk aggregation requires a unified position data model, consistent security master, and a single analytics layer.

**"We need to ingest real-time market data for our analytics platform"**
High-volume tick data ingestion — streaming pipeline, time-series storage, and query optimization for market data workloads.
</script>

# Risk, Compliance & Regulatory Reporting

## Overview

Risk and compliance is not a department at a bank — it is woven into every product, every transaction, and every data pipeline. Regulators worldwide have made it clear that the quality of a bank's data is as important as the quality of its capital. BCBS 239, the Basel Committee's principles for risk data aggregation, exists specifically because regulators discovered during the 2008 financial crisis that major banks could not accurately report their own risk exposures.

For Data SAs, risk and compliance is both a constraint and an opportunity. It is a constraint because every data platform you build in BFSI must satisfy lineage, auditability, retention, and accuracy requirements. It is an opportunity because compliance failures are existential events for a bank — the business case for better data infrastructure is already made.

## The Three Lines of Defence

Banks organize risk management around a "three lines of defence" model. Understanding this helps you know who your stakeholder is:

| Line | Who they are | Their data need |
|------|-------------|-----------------|
| **1st Line** | Business (traders, relationship managers, branch staff) | Risk dashboards, real-time position data, limit alerts |
| **2nd Line** | Risk & Compliance functions | Independent risk measurement, regulatory reporting, policy monitoring |
| **3rd Line** | Internal Audit | Audit trails, data lineage, access logs, historical data replay |

## Credit Risk

Credit risk is the risk that a borrower fails to repay a loan. It is the largest source of losses for most banks.

**Key data inputs:**
- Internal credit scoring models (behavioral, application, bureau data)
- Credit bureau feeds (Equifax, Experian, TransUnion) — updated at origination and periodically
- Collateral valuations (property prices for mortgage portfolios, asset values for secured lending)
- Macroeconomic data (unemployment rates, interest rates — inputs to stress testing models)
- Early arrears signals (missed payments, overlimit events, contact center flags)

**Key outputs:**
- PD (Probability of Default), LGD (Loss Given Default), EAD (Exposure at Default) — the three components of expected credit loss
- IFRS 9 staging: every loan must be classified as Stage 1 (performing), Stage 2 (significant increase in credit risk), or Stage 3 (defaulted) for accounting purposes
- ECL (Expected Credit Loss) reserve calculations — directly impacts the bank's income statement

**Data SA angle:** IFRS 9 ECL calculations require joining loan data, credit model outputs, macroeconomic scenarios, and historical loss data. Banks running this in Excel or legacy SAS environments are prime candidates for modernization.

## Market Risk

Market risk is the risk of loss from changes in market prices — interest rates, FX rates, equity prices, commodity prices.

**Key measures and their data requirements:**
- **VaR (Value at Risk):** Requires full position inventory + historical market data (typically 1–2 years of daily returns)
- **Stressed VaR / Expected Shortfall:** Requires a specific historical stress period (e.g., 2008 crisis data) applied to current positions
- **FRTB (Fundamental Review of the Trading Book):** New Basel standard requiring much more granular risk factor data and model approval processes — a significant data engineering challenge
- **Interest Rate Risk in the Banking Book (IRRBB):** Requires modeling how net interest income changes as rates move — needs full loan and deposit book data with behavioral assumptions

## Operational Risk

The risk of loss from failed processes, people, systems, or external events. Less amenable to quantitative modeling than credit or market risk, but regulators require banks to collect operational loss event data.

**Data requirement:** Loss event database — date, business line, event type, amount, root cause. Banks must submit this data to regulators and use it to calibrate capital models.

## AML (Anti-Money Laundering)

AML is the process of detecting customers who are using the bank to launder criminal proceeds. It generates some of the largest and most complex data workloads in retail banking.

**Key components:**
- **Transaction Monitoring:** Rules and ML models that flag unusual transaction patterns (structuring, rapid cash movement, mule accounts). Runs on the full transaction history — often the most data-intensive workload in a retail bank.
- **Sanctions Screening:** Every payment must be checked against sanctions lists (OFAC, EU, UN) in real time. Requires a low-latency lookup against a constantly updated reference dataset.
- **Customer Risk Rating:** Each customer is assigned an AML risk rating (Low/Medium/High) based on their profile, jurisdiction, and transaction behavior. High-risk customers require Enhanced Due Diligence (EDD).
- **SAR Filing:** Suspicious Activity Reports filed with regulators (FinCEN in the US, NCA in the UK) when money laundering is suspected. The data trail supporting a SAR must be complete and auditable.

**Data SA angle:** Legacy transaction monitoring runs overnight on the previous day's transactions. Modern banks want to detect suspicious patterns in near-real time. This is a streaming pipeline + graph analytics problem (following money across multiple hops through the banking system).

## KYC / KYB (Know Your Customer / Know Your Business)

KYC is the process of verifying a customer's identity before opening an account and monitoring them on an ongoing basis. KYB is the equivalent for corporate customers.

**Data flows:**
- Identity document capture and verification (ID, passport, proof of address)
- PEP (Politically Exposed Person) and adverse media screening — third-party data feeds
- UBO (Ultimate Beneficial Owner) data for corporate customers — often from external registry providers
- Ongoing monitoring — customer risk ratings are refreshed periodically and when triggered by events

**SA conversation:** KYC data is highly unstructured (scanned documents, news articles) and spread across multiple vendors and systems. A document AI + entity resolution pipeline is a strong solution here.

## BCBS 239: The Data Architect's Regulatory Framework

BCBS 239 (Basel Committee on Banking Supervision, Principles for Effective Risk Data Aggregation and Risk Reporting) is the regulation that most directly shapes enterprise data architecture decisions at large banks.

Its 14 principles boil down to four things:
1. **Governance** — A bank must know where its risk data comes from and who owns it
2. **Data architecture and IT infrastructure** — Risk data must be integrated and cannot live in disconnected silos
3. **Accuracy and integrity** — Risk data must be accurate, complete, and reconciled to the source systems
4. **Timeliness** — Risk reports must be producible within agreed timeframes (including under stress conditions)

**Direct implication for SAs:** Banks that are BCBS 239 compliant need data lineage tools, data quality monitoring, a data catalogue, and a clearly defined golden source for each risk metric. This is a modern data platform sale.

## Common Customer Problems You Will Hear

**"We can't produce our CCAR/stress test results on time"**
Stress testing requires aggregating data from dozens of systems under time pressure. The data pipeline is too fragile and too slow. The conversation is about data consolidation, pipeline reliability, and compute scalability.

**"Our AML transaction monitoring is producing too many false positives"**
Legacy rule-based systems flag too much and the investigations team is overwhelmed. ML-based behavioral analytics can reduce false positives significantly — this is a data + ML platform conversation.

**"We have no data lineage and our regulator is asking for it"**
Classic data governance gap. The bank cannot explain where a number in a regulatory report came from. A data catalogue with automated lineage is the solution.

**"Our IFRS 9 ECL process is manual and takes 3 weeks to run"**
A combination of poor data integration (the loan book lives in 5 systems) and inefficient computation (running in SAS on a single server). A cloud data platform with integrated ML can run this in hours.

# Insurance (P&C and Life)

## Overview

Insurance is fundamentally a data business. An insurer collects premiums today based on a statistical model of future losses. Get the model wrong — either because the data going in is bad or because rare events cluster unexpectedly — and the insurer pays out more than it collected. The entire business model depends on the quality and breadth of data used to price risk.

For Data SAs, insurance is interesting because it has three genuinely distinct data workloads: underwriting (pricing risk at origination), claims (processing losses when they occur), and actuarial (long-term financial modeling of the portfolio). Each workload has different latency, volume, and accuracy requirements.

## The Two Major Insurance Segments

### Property & Casualty (P&C) — Also called General Insurance
Covers losses to physical assets or third-party liability. Common products: motor insurance, home insurance, commercial property, liability, travel, cyber.

**Characteristics:** Shorter policy terms (usually annual), high claim frequency for motor/home, can have extreme tail risk (natural catastrophes), large external data dependency (weather, geospatial, telematics).

### Life & Health Insurance
Covers mortality (death benefit), disability, critical illness, and in some markets, health expenses. Also includes savings and investment-linked products (see Section 09 on Retirement for overlap).

**Characteristics:** Very long policy terms (decades for whole life), low claim frequency but high severity, heavy actuarial modeling, tightly regulated for solvency (Solvency II in the EU, RBC in the US).

## The Insurance Data Lifecycle

```
Distribution → Underwriting → Policy Issuance → In-force Management → Claims → Run-off
      ↓               ↓              ↓                    ↓              ↓          ↓
 Quote data      Risk data       Policy record        Renewal data    FNOL data   Reserve data
 Lead data       Pricing model   Premium schedule     Change events   Claim file  Regulatory
 Broker data     External data   Document store       Telematics      Settlement  Reinsurance
```

## Underwriting & Pricing

Underwriting is the process of evaluating risk and deciding what premium to charge. It is the most data-intensive phase of the insurance lifecycle and the one where competitive advantage is most directly tied to data quality.

**Key data inputs for pricing:**
- **Applicant data:** Age, location, claims history, no-claims discount, occupation
- **Vehicle data (motor):** Make, model, age, modifications, telematics data
- **Property data (home):** Construction type, age, rebuild value, flood zone, crime statistics
- **Third-party data:** Credit scores, weather history, geospatial risk scores, catastrophe model outputs
- **Internal loss data:** Historical claims by risk segment — the foundation of every pricing model

**Pricing models** range from simple actuarial rate tables to complex Generalized Linear Models (GLMs) and, increasingly, gradient boosting and neural networks. The model output is a technical price; underwriters may apply adjustments for large commercial risks.

**Data SA conversation:** Insurers want to incorporate more data sources (telematics, satellite imagery, IoT sensors) into pricing. This requires pipelines that can ingest diverse external data, join it to policy records, and feed it into model training and real-time scoring.

## Policy Administration

Once a policy is issued, the policy administration system (PAS) is the system of record. It tracks:
- Policy terms (coverage, exclusions, limits, deductibles)
- Premium schedule and payment status
- Endorsements (mid-term changes to coverage)
- Renewals

**Data challenge:** Most insurers run legacy PAS systems (some decades old). Migrating data out of these systems — or building a modern data layer on top of them — is a common modernization project.

## Claims

A claim is initiated when a policyholder reports a loss. Claims data is some of the most complex and valuable data in insurance.

**FNOL (First Notice of Loss):** The initial claim report. May come via phone, web portal, or increasingly via telematics/IoT (e.g., a connected car automatically reporting an accident). Starts the claims workflow.

**Claims data elements:**
- Incident details (date, location, circumstances, parties involved)
- Policy details (coverage at time of loss)
- Third-party data (police report, medical records, repair estimates, weather data at incident location)
- Reserve (the insurer's estimate of what the claim will ultimately cost)
- Payments (partial and final settlements)
- Subrogation (recovery from a third party who was at fault)

**Claims fraud** is a major data problem. In motor insurance, 10–20% of claims are estimated to involve some element of fraud. Fraud detection models look for patterns in claim characteristics, claimant history, repair shop networks, and social network connections between claimants.

## Actuarial Modeling

Actuaries use statistical models to estimate the future cost of claims already incurred or expected to be incurred on in-force policies. Their outputs directly determine how much capital the insurer must hold.

**Key actuarial data workloads:**
- **Reserve estimation (IBNR):** Incurred But Not Reported claims — the insurer must estimate the ultimate cost of claims that have occurred but haven't been reported yet. Requires historical claims development triangles.
- **Pricing validation:** Testing whether actual loss experience matches the pricing assumptions.
- **Capital modeling:** Simulating thousands of scenarios to determine the capital needed to survive extreme events (Solvency II ORSA, RBC).
- **Catastrophe (Cat) modeling:** Modeling the impact of hurricanes, earthquakes, or floods on the property portfolio — uses specialized third-party cat models (AIR, RMS) combined with the insurer's own exposure data.

**Data SA angle:** Actuarial workloads are traditionally run in SAS, R, or specialized actuarial tools on small data samples. Moving to a cloud data platform allows actuaries to run models on the full dataset, run more scenarios faster, and integrate with modern ML tools.

## Reinsurance

Reinsurers insure insurers — they take on a portion of the risk in exchange for a portion of the premium. Reinsurance arrangements generate their own data flows:
- **Bordereau data:** Detailed policy or claims data shared with the reinsurer periodically
- **Treaty statements:** Premium and claims summaries for portfolio reinsurance arrangements
- **Facultative placement data:** Individual risk submissions for large or complex risks

**Data challenge:** Bordereau data exchange is often still file-based (Excel, CSV via email or SFTP). Modernizing this is a clear data platform opportunity.

## Solvency II (EU) and RBC (US) — Key Regulatory Frameworks

| Framework | Jurisdiction | What it requires |
|-----------|-------------|-----------------|
| **Solvency II** | EU | Pillar 1: quantitative capital requirements. Pillar 2: governance and risk management. Pillar 3: regulatory reporting (QRT templates — very data-intensive quarterly submissions) |
| **Risk-Based Capital (RBC)** | USA | State-level capital requirements based on asset and liability risk |
| **IFRS 17** | Global | New insurance contract accounting standard — requires granular data on contract groups, coverage units, and risk adjustment calculations |

**IFRS 17** is particularly important for Data SAs right now. It came into force in 2023 and requires insurers to calculate profit in a fundamentally different way, needing granular data at the contract group level. Many insurers are still building or stabilizing their IFRS 17 data pipelines.

## Common Customer Problems You Will Hear

**"Our pricing team can't experiment with new data sources"**
Data science is bottlenecked on data engineering. A self-service data platform with pre-ingested third-party data (weather, geospatial, telematics) removes the friction.

**"Our claims reserves are calculated monthly in a spreadsheet"**
Manual actuarial process with poor auditability. Moving IBNR calculations to a governed, version-controlled data pipeline with a proper data model is the modernization play.

**"We're failing our Solvency II Pillar 3 reporting deadlines"**
The QRT (Quantitative Reporting Template) submissions require data from across the business assembled to tight deadlines. A reliable, orchestrated data pipeline with data quality checks is the solution.

**"Our fraud detection is based on rules and our fraud rate is rising"**
Rules-based fraud detection is easily gamed. ML models trained on claims characteristics and network data (connected claimants, repair shops, medical providers) significantly outperform rules. This is a data + ML platform conversation.
</script>

# Wealth & Asset Management

## Overview

Wealth management serves individuals and families who want to grow and protect their financial assets. Asset management serves institutional clients — pension funds, insurance companies, endowments — who pool capital and invest it professionally. Both segments are in the business of generating investment returns on behalf of clients, and both are deeply dependent on data to do it.

For Data SAs, wealth and asset management conversations tend to center on two themes: **performance and reporting** (did the portfolio make money, and can we prove it?) and **compliance and suitability** (are we managing money in a way that is appropriate for the client and defensible to a regulator?).

## Wealth Management: Key Concepts

### Client Segments
Wealth management is typically segmented by the size of the client's assets:

| Segment | Assets Under Management | Service model |
|---------|------------------------|---------------|
| **Mass Affluent** | $100K – $1M | Digital/hybrid, limited advisor interaction |
| **High Net Worth (HNW)** | $1M – $30M | Dedicated relationship manager, broader product range |
| **Ultra High Net Worth (UHNW)** | $30M+ | Full private banking service, family office structures, alternative investments |

### Advisory Models
- **Discretionary management:** The wealth manager makes investment decisions on the client's behalf within an agreed mandate. Requires demonstrating that decisions were consistent with the mandate — a data audit trail problem.
- **Advisory:** The advisor recommends, the client decides. Requires documenting advice given and whether the client followed it — suitability records.
- **Execution-only:** The client makes their own decisions. The platform just executes. Still requires KYC.
- **Robo-advisory:** Algorithm-driven portfolio construction and rebalancing, usually for the mass affluent segment. Generates large volumes of automated decision records that must be explainable.

### Key Products
- **Managed portfolios:** Discretionary model portfolios invested across equities, bonds, and alternatives
- **Structured products:** Bespoke investment products with defined payoff profiles (capital protection + upside participation)
- **Alternative investments:** Private equity, hedge funds, real estate, infrastructure — illiquid, complex to value and report
- **Custody:** Safekeeping of securities on behalf of the client — the custodian holds the assets and provides consolidated statements

## Asset Management: Key Concepts

### Fund Structures
- **UCITS (EU) / Mutual Funds (US):** Regulated, daily-liquidity funds for retail and institutional investors. Well-understood data model: NAV calculated daily, holdings disclosed periodically.
- **ETFs (Exchange-Traded Funds):** Listed funds that track an index. Create/redeem mechanism generates additional data flows between the ETF issuer and authorized participants.
- **Hedge Funds:** Less regulated, more complex strategies (long/short, macro, quant). Institutional investors only.
- **Private Equity / Infrastructure:** Closed-ended funds with a defined investment period and exit timeline. Very illiquid — assets are valued quarterly or less frequently.

### The Investment Management Process

```
Client mandate → Portfolio construction → Order generation → Execution → Settlement → Valuation → Reporting
       ↓                  ↓                     ↓               ↓            ↓             ↓            ↓
 IPS / guidelines    Model portfolio         OMS/EMS          Trade data   Custody data   NAV calc   Client report
 Risk parameters     Factor model            Compliance pre-  Allocation   Reconciliation  Performance Attribution
 Benchmark           Optimisation            trade check      Confirmations                GIPS calc  Regulatory
```

### Key Data Domains

**Portfolio data:** Holdings (security, quantity, cost basis), transactions, cash positions, corporate actions applied. The portfolio record must reconcile with the custodian's record daily.

**Market data:** Pricing for every security in every portfolio, every day. For liquid securities this is straightforward. For alternatives and OTC derivatives, pricing may require models or third-party valuations.

**Performance data:** Return calculations — time-weighted return (TWR) for manager performance, money-weighted return (MWR / IRR) for client experience. Attribution breaks down returns by asset allocation and security selection decisions.

**Benchmark data:** Index returns and compositions (e.g., MSCI World, Bloomberg Aggregate Bond Index) sourced from index providers — third-party data with licensing implications.

**Compliance data:** Investment guidelines and breaches. Pre-trade compliance checks stop orders that would violate guidelines. Post-trade monitoring catches breaches that slip through.

## Performance Measurement & GIPS

GIPS (Global Investment Performance Standards) is a global standard for calculating and presenting investment performance. Asset managers that claim GIPS compliance must follow strict rules for how returns are calculated, composites are constructed, and performance is presented.

**Why this matters for data:** GIPS compliance requires a complete, auditable history of every portfolio, every transaction, and every valuation. Data cannot be restated or corrected without documentation. The data platform must support point-in-time historical queries — you need to reproduce what the portfolio looked like on any given day in the past.

## Regulatory Landscape

| Regulation | Jurisdiction | What it means for data |
|-----------|-------------|------------------------|
| **MiFID II** | EU | Suitability documentation, best execution reporting, inducements disclosure |
| **PRIIPs KID** | EU | Standardized key information document for investment products — requires performance scenario calculations |
| **AIFMD** | EU | Alternative Investment Fund reporting — Annex IV regulatory reports to national regulators |
| **SEC Regulation Best Interest** | USA | Suitability documentation requirements for broker-dealers |
| **FATCA / CRS** | USA / Global | Tax information sharing — requires tracking client tax residency and reporting investment income |

## Common Customer Problems You Will Hear

**"Our performance reports take 3 days to produce and clients are complaining"**
Manual performance calculation process pulling data from multiple custodians and systems. A unified data platform with automated reconciliation and performance calculation dramatically reduces this.

**"We can't demonstrate suitability for our discretionary clients"**
The wealth manager is making decisions but not recording the rationale against the client's investment policy statement. A data platform that links every transaction to the portfolio mandate provides the audit trail.

**"Our custodian reconciliation breaks every day and we spend half the day fixing it"**
The portfolio management system and the custodian have different views of positions and cash. An automated reconciliation pipeline with exception management workflow is the solution.

**"We're launching a new ESG fund and need ESG data integrated into our investment process"**
ESG data (carbon emissions, board diversity, governance scores) comes from specialist data providers (MSCI ESG, Sustainalytics). Ingesting, normalizing, and integrating it with portfolio data for stock selection and reporting is a data engineering problem.

**"We acquired a fund manager and need to consolidate their data"**
Different portfolio management systems, different custodians, different data models. A data lake / data platform acts as the integration layer, with the PMS migration happening in a second phase.
</script>

# Retirement Products & Pension Data

## Overview

Retirement is one of the most data-intensive and long-horizon financial businesses that exists. A pension fund may hold records for a participant who joined at age 22 and live to claim a benefit at 85 — a 63-year data relationship. Every contribution, every salary change, every life event (marriage, divorce, death), and every investment return must be recorded accurately because the benefit calculation at retirement depends on the complete history.

For Data SAs, pension and retirement is uniquely challenging because the data does not just need to be accurate *today* — it must be reproducible at any point in the past. "What was this member's projected benefit on 1st January 2010?" must be answerable decades later, typically for regulatory, legal, or audit purposes.

## The Two Major Retirement Models

### Defined Benefit (DB) — "Final Salary" or "Career Average"
The employer promises a specific benefit at retirement — typically a formula based on salary and years of service. The employer bears the investment risk: if the fund underperforms, the employer must make up the shortfall.

**Example benefit formula:** 1/60th of final salary × years of service
- 30 years of service, £60,000 final salary = £30,000 per year pension

DB schemes are largely closed to new entrants in the private sector (the liability is too uncertain), but many legacy schemes remain open to existing members and have very large asset pools. Public sector schemes (government, teachers, NHS) are still predominantly DB.

**Data characteristics:** Long member history, actuarial valuation required (typically every 3 years), complex benefit calculations at retirement, survivor benefits (spouses, dependants), transfer value calculations.

### Defined Contribution (DC) — "Money Purchase"
The employer and/or employee contribute a defined amount into an individual account. The account is invested in market funds. Whatever the pot is worth at retirement is what the member gets — the member bears the investment risk.

**Examples:** 401(k) in the USA, workplace pensions in the UK (NEST, employer schemes), superannuation in Australia.

**Data characteristics:** Per-member account balance, contribution records, investment election, fund performance, charges, and ultimately a decumulation event (annuity purchase, drawdown, or lump sum).

### Hybrid Schemes
Some schemes combine DB and DC elements. Cash Balance plans are a common example — the employer promises a pot size (like DC) but the pot is based on a formula (like DB). The employer bears investment risk up to the promised pot level.

## Key Retirement Data Domains

### Member Data
The foundation of any pension administration system. Each member record contains:
- Personal details (name, date of birth, NI/SSN, address, marital status)
- Employment history (employer, start date, service breaks, end date)
- Salary history (for DB benefit calculation)
- Nomination of beneficiaries (who receives a death benefit)
- Contact and bank details (for payment)
- Communication preferences and engagement history

**Data quality challenge:** Member data accumulated over decades is often dirty. Address records go stale, names change on marriage/divorce, beneficiary nominations become outdated. Data cleansing campaigns are a recurring exercise for large pension administrators.

### Contribution Data
For DC schemes, every contribution must be tracked:
- Contribution date, amount, source (employee vs. employer vs. additional voluntary)
- Investment allocation at time of contribution
- Payroll source data — contributions originate from payroll files

**Reconciliation:** Contributions must reconcile between the payroll system (what was deducted from pay) and the pension administrator's record (what was received and invested). Breaks occur regularly and must be investigated and corrected.

### Investment & Valuation Data

**For DB schemes:**
- The scheme holds a large, diversified investment portfolio managed by external asset managers
- Asset valuations feed into the actuarial valuation — determining whether the scheme is in surplus or deficit
- The Liability Driven Investment (LDI) strategy that many DB schemes use requires matching asset duration to liability duration — complex data joins between asset positions and member benefit projections

**For DC schemes:**
- Each member has a "pot" invested across a range of fund options
- Daily unit prices are applied to member holdings to calculate account balances
- Lifestyle/target-date fund switching means contributions are automatically moved to lower-risk assets as the member approaches retirement

### Benefit Calculation Data

**DB benefit calculation at retirement** is surprisingly complex:
- Basic pension = accrual rate × pensionable service × pensionable salary (with adjustments for revaluation during deferment)
- Early retirement reduction (if taken before Normal Retirement Age)
- Late retirement enhancement (if taken after NRA)
- Commutation (trading pension for a tax-free cash lump sum)
- Guaranteed Minimum Pension (GMP) for contracted-out schemes (UK) — historical government override that complicates benefit calculations enormously

**GMP is a known pain point:** Millions of UK scheme members accrued GMP rights between 1978 and 1997 — a government override of the scheme benefit. These rights are complex, historically poorly recorded, and require a reconciliation process called "GMP reconciliation" against HMRC records. Many schemes are still working through this.

### Regulatory Reporting Data

| Report / Submission | Who requires it | Frequency | Data complexity |
|--------------------|----------------|-----------|-----------------|
| **Actuarial valuation** | Scheme trustees (DB) | Every 3 years | Full member data + investment data + actuarial assumptions |
| **Annual benefit statements** | Members | Annual | Per-member projected benefit calculation |
| **PPF (Pension Protection Fund) levy data** | UK PPF | Annual | Scheme funding level and investment risk assessment |
| **Pensions Dashboard** | UK FCA/TPR (from 2024-26) | Real-time API | Member benefit entitlements must be queryable on-demand |
| **HMRC pension savings statements** | HMRC | Annual | Members who exceed the Annual Allowance for tax-relieved contributions |
| **Auto-enrolment declarations** | UK TPR | At enrollment | Employer confirms eligible workers have been enrolled |
| **Form 5500** | US DOL | Annual | DC scheme financial and participation data (USA) |

## The Pensions Dashboard (UK) — A Live Data Architecture Challenge

The UK government is mandating that all pension schemes connect to a central "Pensions Dashboard" by 2026–2027. Members will be able to log in and see all their pension entitlements from every scheme they have ever been in — a "find all my pensions" service.

**What this requires from schemes:**
- A real-time API that can respond to a member identity query with their current entitlement data within seconds
- Member data must be cleansed and matched against a national identity system
- For DB schemes, projected benefit at retirement must be calculated on-demand — not just at annual statement time

This is a live data engineering project at hundreds of pension schemes right now. It requires modernizing legacy batch-based member administration systems to support real-time queries.

## Decumulation: The Other End of the Pipeline

Accumulation (saving up) gets most of the attention, but decumulation (drawing down in retirement) has its own data complexity.

**Annuities:** The member uses their DC pot to buy a guaranteed income for life from an insurance company. The annuity purchase generates a data event: the pot is transferred, an annuity contract is created, and payments begin. The insurer now holds the longevity risk and needs actuarial data to model it.

**Drawdown (Flexi-access drawdown):** The member leaves the pot invested and draws an income directly from it. The pot remains in the pension scheme/platform — generating ongoing valuation, investment, and payment data. In the UK, drawdown became very common after the "pension freedoms" reforms of 2015.

**Defined Benefit in payment:** The scheme pays a monthly pension to the member for the rest of their life (and potentially a survivor's pension to a spouse). The scheme must maintain a payroll for retired members — sometimes tens of thousands of pensioners — and apply annual increases (typically linked to RPI or CPI inflation).

## Common Customer Problems You Will Hear

**"We can't produce our annual benefit statements on time"**
The benefit calculation requires data from multiple legacy systems (payroll history, scheme rules, fund valuations) that are poorly integrated. A data platform that consolidates member and benefit data into a single governed store makes statement generation reliable and auditable.

**"Our GMP reconciliation has been running for 5 years and we're still not done"**
GMP data quality issues are endemic. The cleansing, matching, and correction process requires data engineering at scale — matching member records to HMRC data, identifying discrepancies, and applying corrections in a controlled, auditable way.

**"We need to connect to the Pensions Dashboard and we have no real-time capability"**
The scheme currently calculates benefits in a nightly batch run. Connecting to the dashboard requires on-demand calculation. This is a data modernization project — moving from batch to on-demand benefit calculation.

**"We're consolidating three DB schemes following a company merger"**
Three different scheme rules, three different member administration systems, potentially three different actuarial assumptions. Data migration, member matching, and benefit harmonization are all data engineering problems.

**"Our trustees can't see the scheme's funding position in real time"**
The actuarial valuation is a point-in-time exercise done every 3 years, with interim estimates done less frequently. Real-time or daily funding level estimates require integrating investment data (daily valuations) with liability estimates (actuarial model outputs) into a dashboard.

# Core Banking Systems & Data Architecture

## Overview

Core banking systems are the operational backbone of a bank — the system of record for accounts, transactions, and customer relationships. Understanding what they are, why they are so hard to replace, and how data flows out of them is essential for any Data SA working in BFSI.

Most data platform conversations in banking start with the question: "how do we get data out of the core banking system in a way that is reliable, timely, and doesn't break the bank's operations?" The answer to that question shapes the entire data architecture.

## What Is a Core Banking System?

A core banking system (CBS) is the central software that processes all financial transactions and maintains the ledger — the definitive record of every account balance and every transaction that moved money. All channels (branch, ATM, mobile app, internet banking) ultimately post transactions to the core banking system.

**Key functions of a core banking system:**
- Account management (opening, maintenance, closure)
- Transaction processing and posting
- Interest calculation and accrual
- Regulatory balance reporting (end-of-day positions)
- General ledger (GL) interface — feeding the bank's financial accounting system

### Major Core Banking Vendors

| Vendor | Product | Common in |
|--------|---------|-----------|
| **Temenos** | T24 / Transact | Tier 2 and 3 banks globally |
| **FIS** | Profile, Modern Banking Platform | US and global |
| **Finastra** | Fusion Equation, Kondor | Global |
| **Mambu** | Cloud-native SaaS | Fintechs, challenger banks, modernizing banks |
| **Thought Machine** | Vault Core | Cloud-native, newer entrants |
| **Finacle (Infosys)** | Finacle | Asia, Africa, India |
| **In-house systems** | Bespoke COBOL | Many large banks still run mainframe-era custom systems |

## Why Core Banking Is So Hard to Replace

The core banking system is the most mission-critical piece of software a bank runs. A 30-minute outage during business hours is front-page news and regulatory scrutiny. A failed migration can bring down the bank.

**The migration problem:**
- Decades of transaction history must be migrated accurately
- Thousands of downstream systems have integrations built against the existing CBS
- The CBS cannot be switched off — migrations must run in parallel, with a cutover during a very tight window
- Any data discrepancy between old and new systems is a regulatory and audit problem

This is why many banks have been "planning to replace the core banking system" for 20+ years and still haven't. The data risk alone is enormous.

**The practical implication for Data SAs:** Most customers are not replacing their core banking system — they are building a data layer *around* it. Your job is to extract data from the CBS reliably, not to replace it.

## How Data Flows Out of Core Banking

### End-of-Day Batch Extracts
The traditional approach. At end of business, the CBS produces flat files (fixed-width or CSV) containing the day's transactions and current account balances. These are loaded into a data warehouse overnight.

**Problems:** 24-hour latency, brittle file-based integrations, no history of intraday state, schema changes in the CBS break the extract.

### Database Replication
Directly replicating the CBS database to a read replica or staging environment. Some CBS vendors support this; others do not, or require significant licensing.

**Problems:** The CBS data model is often highly normalized and difficult to query. The schema is vendor-specific and may not be documented. Tightly coupled to the CBS vendor's internal data structure.

### Change Data Capture (CDC)
Capturing every change to the CBS database in real time as it happens, by reading the database transaction log. Tools like Debezium, Oracle GoldenGate, or AWS DMS enable this pattern.

**This is the gold standard for modern data ingestion from core banking.** CDC provides:
- Near-real-time data availability (seconds of latency)
- Complete change history (not just current state)
- Low impact on the CBS itself (reads the log, not the primary database)
- Exactly-once delivery semantics when implemented correctly

### API / Event Bus
Modern cloud-native core banking systems (Mambu, Thought Machine Vault) expose event streams and APIs natively. Every transaction is an event published to a message broker (Kafka) that downstream systems can consume.

**This is the ideal architecture** but only available for banks that have already modernized or deployed a new CBS. The majority of banks are still working with legacy systems.

## The Typical BFSI Data Architecture

Even without a core banking replacement, most banks evolve toward a similar data architecture:

```
Core Banking System (CBS)
        ↓ (CDC / batch extract)
    Staging / Landing Zone (raw data, immutable)
        ↓
    Integration Layer (cleanse, standardize, apply business rules)
        ↓
    Enterprise Data Warehouse / Data Lakehouse
        ↓                    ↓                    ↓
  Regulatory Reporting   Risk Analytics     Customer 360
  (overnight batch)      (intraday)         (real-time)
```

Around this core flow, there are dozens of other source systems feeding in:
- Loan origination systems (LOS)
- Card processing platforms (often third-party, e.g., FIS, Worldline)
- CRM systems (Salesforce, Microsoft Dynamics)
- Trading systems (Bloomberg, Murex, Calypso)
- Market data vendors (Refinitiv, Bloomberg)
- Insurance policy administration systems
- Regulatory reference data (LEI, ISIN, MCC codes)

## Data Management Concepts That Come Up in Every BFSI Conversation

### Golden Source / Single Source of Truth
Which system is authoritative for a given data element? If the CBS says the balance is £100 and the data warehouse says £102, which is right? Establishing golden sources and ensuring downstream systems match them is a fundamental data governance exercise.

### Data Lineage
The ability to trace a number in a report back to the source transaction that caused it. Required by BCBS 239, auditors, and regulators. Modern data platforms with built-in lineage (e.g., Apache Atlas, dbt with metadata, Databricks Unity Catalog) satisfy this requirement.

### Data Quality & Reconciliation
Financial data must balance. The sum of all account balances must equal the general ledger. The sum of all card transaction settlements must match the payment network's settlement file. Automated reconciliation jobs that detect and alert on breaks are a non-negotiable part of BFSI data pipelines.

### Data Retention & Archival
Regulatory requirements typically mandate:
- Transaction data: 7–10 years
- AML investigation records: 5–7 years
- Trade records (MiFID II): 7 years
- Pension member records: potentially lifetime + 6 years

Cost-effective tiered storage (hot/warm/cold) is important for very large historical datasets.

### Point-in-Time Query
The ability to answer "what was the state of X on date Y?" — essential for audits, disputes, regulatory inquiries, and backtesting. Requires temporal data modeling (SCD Type 2 or event sourcing patterns). Not all data warehouses support this well; it must be designed in.

## Common Customer Problems You Will Hear

**"Our core banking vendor is charging us a fortune for data access"**
Some CBS vendors charge separately for data extracts or API access. A CDC-based approach reading the database log directly can bypass this, but requires careful discussion with the vendor about licensing.

**"We can't reconcile our CBS data with our downstream data warehouse"**
Data is lost or transformed in the ETL layer without proper lineage tracking. Implementing CDC with immutable raw staging and clear transformation lineage solves this.

**"We want to migrate to a cloud-native core banking system"**
This is a major, multi-year programme. The data workstream includes: full historical data migration, parallel-run reconciliation, cutover data validation, and ensuring all downstream data consumers are re-pointed. This is a significant data engineering engagement.

**"We have 40 different systems and no one knows where the customer master data lives"**
Classic enterprise data management problem in banking. The answer is a master data management (MDM) initiative — establishing a golden source customer record and propagating it. A data catalog and data lineage tool help map what exists before you start.
</script>
