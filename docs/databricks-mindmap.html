<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>

<style>
:root {
  --bg:#0f1117; --surface:#1a1d27; --text:#e8eaf0; --muted:#8b9ab0; --border:#2a2f45;
  --c0:#E87722; --c1:#1B6CA8; --c2:#7B2FBE; --c3:#0E8A6E;
  --c4:#C0392B; --c5:#2C7BB6; --c6:#D4AC0D; --c7:#1A7A4A; --c8:#5D6D7E;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;overflow:hidden;height:100vh;}

#header{
  position:fixed;top:0;left:0;right:0;z-index:100;
  background:var(--surface);border-bottom:1px solid var(--border);
  padding:9px 16px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;
}
#header h1{font-size:14px;font-weight:700;white-space:nowrap;}
#header span{font-size:11px;color:var(--muted);}
#legend{display:flex;flex-wrap:wrap;gap:6px;margin-left:auto;}
.li{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--muted);}
.ld{width:9px;height:9px;border-radius:50%;flex-shrink:0;}

#canvas{position:fixed;top:44px;left:0;right:0;bottom:0;width:100%;height:calc(100vh - 44px);display:block;}

.link{fill:none;stroke:#2a2f45;stroke-width:1.5;opacity:.7;}
.node{cursor:pointer;}
.node circle{stroke-width:2;transition:filter .15s;}
.node:hover circle{filter:brightness(1.4);}
.node text{pointer-events:none;fill:var(--text);text-anchor:middle;dominant-baseline:central;}
.collapsed circle{stroke-dasharray:5,3;}

#panel{
  position:fixed;top:54px;right:0;bottom:0;width:320px;
  background:var(--surface);border-left:1px solid var(--border);
  transform:translateX(100%);transition:transform .25s ease;
  overflow-y:auto;padding:18px;display:flex;flex-direction:column;gap:10px;
}
#panel.open{transform:translateX(0);}
#pcls{position:absolute;top:10px;right:10px;background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;line-height:1;}
#pcls:hover{color:var(--text);}
#pbadge{display:inline-block;font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:2px 8px;border-radius:3px;}
#ptitle{font-size:16px;font-weight:700;line-height:1.3;}
#pdesc{font-size:12px;color:var(--muted);line-height:1.6;}
.slbl{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-top:4px;}
#pchips{display:flex;flex-wrap:wrap;gap:5px;}
.chip{font-size:10px;padding:2px 8px;border-radius:10px;border:1px solid var(--border);color:var(--muted);background:var(--bg);}
.tag-critical{background:#3d1515;border-color:#7b2525;color:#f08080;}
.tag-new{background:#1a3d1a;border-color:#2d7a2d;color:#7ee07e;}
.tag-quick{background:#1a2a3d;border-color:#2d567a;color:#7eb8f0;}
#pnotes{border-top:1px solid var(--border);padding-top:8px;}
#pnotes a{color:#4CAF50;font-size:12px;text-decoration:none;}
#pnotes a:hover{text-decoration:underline;}

#tip{position:fixed;pointer-events:none;background:rgba(15,17,23,.95);border:1px solid var(--border);border-radius:6px;padding:7px 11px;font-size:11px;color:var(--text);max-width:240px;line-height:1.5;display:none;z-index:200;}
#hint{position:fixed;bottom:10px;left:12px;font-size:10px;color:var(--muted);}
</style>
</head>

          chips:['Data drift','Schema drift','Model drift','Statistical profiles','Alerts','Data quality'] },
        { name:'Spark UI\n& Event Logs', domain:8, tag:'quick',
          desc:'Native Spark UI for debugging job execution, stage timelines, shuffle statistics, and executor health. Event logs are persisted to object storage for post-mortem analysis and performance tuning.',
          chips:['Stage timelines','Shuffle stats','Executors','Event logs','Performance tuning','DAG visualisation'] },
        { name:'Third-party\nIntegrations', domain:8, tag:'quick',
          desc:'Export Spark metrics to Datadog, Grafana, or Azure Monitor. Structured Streaming metrics to Prometheus. Audit logs to Splunk or any SIEM via Delta Sharing. Native Grafana dashboards available.',
          chips:['Datadog','Grafana','Prometheus','Splunk','Azure Monitor','Delta Sharing'] },
        { name:'MLflow\nObservability', domain:8, tag:'quick',
          desc:'MLflow 3 adds agent-level observability with per-call trace logging, latency breakdowns, token usage, and LLM-as-judge quality scores. Works for models inside and outside Databricks.',
          chips:['Trace logging','Latency','Token usage','LLM judge','Agent metrics','Cross-platform'] },
      ]
    },
  ]
};

// ── Build d3.hierarchy ─────────────────────────────────────────────────────
const root = d3.hierarchy(RAW);

// Collapse all depth-1 children initially (domain children start hidden)
root.each(d => {
  if (d.depth === 1 && d.children) {
    d._children = d.children;
    d.children = null;
  }
});

function toggle(d) {
  if (d.children) { d._children = d.children; d.children = null; }
  else if (d._children) { d.children = d._children; d._children = null; }
}

// ── SVG setup ──────────────────────────────────────────────────────────────
const svgEl = document.getElementById('canvas');
const svg = d3.select(svgEl);

function getW() { return window.innerWidth; }
function getH() { return window.innerHeight - 44; }

// Let CSS control the visual size; set SVG attributes to match viewport
svg.attr('width', getW()).attr('height', getH());

const g = svg.append('g');
const zoom = d3.zoom().scaleExtent([0.1,3]).on('zoom', e => g.attr('transform', e.transform));
svg.call(zoom).call(zoom.transform, d3.zoomIdentity.translate(getW()/2, getH()/2));
svg.on('click.panel', () => document.getElementById('panel').classList.remove('open'));

// ── Colour helpers ─────────────────────────────────────────────────────────
function dcolor(d) {
  if (d.depth === 0) return '#aab4c8';
  const dom = d.data.domain;
  return (dom >= 0 && dom < COLORS.length) ? COLORS[dom] : '#888';
}
function dfill(d) {
  if (d.depth === 0) return '#1e2232';
  const c = dcolor(d);
  return c + '22';
}
function dradius(d) {
  if (d.depth === 0) return 50;
  if (d.depth === 1) return 36;
  return 26;
}

// ── Force simulation ───────────────────────────────────────────────────────
const sim = d3.forceSimulation()
  .force('charge', d3.forceManyBody().strength(d => d.depth === 0 ? -1800 : d.depth === 1 ? -700 : -350))
  .force('collide', d3.forceCollide().radius(d => dradius(d) + 16).strength(0.8))
  .force('x', d3.forceX(0).strength(0.04))
  .force('y', d3.forceY(0).strength(0.04));

const linkForce = d3.forceLink().id(d => d.id || d.data.name)
  .distance(d => d.source.depth === 0 ? 230 : 160)
  .strength(0.7);
sim.force('link', linkForce);

// ── Persistent element groups ──────────────────────────────────────────────
const linkG = g.append('g').attr('class','links');
const nodeG = g.append('g').attr('class','nodes');

let nodeMap = {}; // store existing node positions by name key

function nodeKey(d) { return d.data.name; }

// ── Main draw/update function ──────────────────────────────────────────────
function draw() {
  const nodes = root.descendants();
  const links = root.links();

  // Preserve positions across redraws
  nodes.forEach(d => {
    const key = nodeKey(d);
    if (nodeMap[key]) { d.x = nodeMap[key].x; d.y = nodeMap[key].y; }
    else { d.x = (Math.random() - 0.5) * 80; d.y = (Math.random() - 0.5) * 80; }
  });

  // ── Links ──────────────────────────────────────────────────────────────
  const linkSel = linkG.selectAll('line.link').data(links, d => nodeKey(d.source)+'>'+nodeKey(d.target));
  linkSel.exit().remove();
  const linkEnter = linkSel.enter().append('line').attr('class','link');
  const linkMerge = linkEnter.merge(linkSel);

  // ── Nodes ──────────────────────────────────────────────────────────────
  const nodeSel = nodeG.selectAll('g.node').data(nodes, nodeKey);
  nodeSel.exit().remove();

  const nodeEnter = nodeSel.enter().append('g').attr('class', d => 'node' + (d._children ? ' collapsed' : ''))
    .call(d3.drag()
      .on('start', (e,d) => { if (!e.active) sim.alphaTarget(0.3).restart(); d.fx=d.x; d.fy=d.y; })
      .on('drag',  (e,d) => { d.fx=e.x; d.fy=e.y; })
      .on('end',   (e,d) => { if (!e.active) sim.alphaTarget(0); d.fx=null; d.fy=null; }))
    .on('click', (e,d) => {
      e.stopPropagation();
      toggle(d);
      openPanel(d);
      draw();
    })
    .on('mouseover', (e,d) => {
      const short = (d.data.desc||'').slice(0,130) + ((d.data.desc||'').length>130?'…':'');
      const tip = document.getElementById('tip');
      tip.innerHTML = `<strong>${d.data.name.replace(/\n/g,' ')}</strong><br>${short}`;
      tip.style.display = 'block';
    })
    .on('mousemove', e => {
      const tip = document.getElementById('tip');
      tip.style.left = (e.clientX+14)+'px';
      tip.style.top  = (e.clientY-14)+'px';
    })
    .on('mouseout', () => { document.getElementById('tip').style.display='none'; });

  nodeEnter.append('circle');

  // Multi-line text
  nodeEnter.each(function(d) {
    const lines = d.data.name.split('\n');
    const lh = 13, total = lines.length * lh;
    const sel = d3.select(this);
    lines.forEach((line, i) => {
      sel.append('text')
        .attr('dy', (i*lh - total/2 + lh/2)+'px')
        .style('font-size', d.depth===0 ? '11px' : d.depth===1 ? '10px' : '9px')
        .style('font-weight', d.depth<=1 ? '600' : '400')
        .text(line);
    });
  });

  const nodeMerge = nodeEnter.merge(nodeSel);

  nodeMerge.attr('class', d => 'node' + (d._children ? ' collapsed' : ''));
  nodeMerge.select('circle')
    .attr('r', dradius)
    .attr('fill', dfill)
    .attr('stroke', dcolor)
    .attr('stroke-width', d => d.depth===0 ? 3 : 2);

  // ── Simulation ─────────────────────────────────────────────────────────
  sim.nodes(nodes);
  linkForce.links(links);
  sim.alpha(0.4).restart();

  sim.on('tick', () => {
    linkMerge
      .attr('x1', d => d.source.x).attr('y1', d => d.source.y)
      .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
    nodeMerge.attr('transform', d => `translate(${d.x},${d.y})`);
    // cache positions
    nodes.forEach(d => { nodeMap[nodeKey(d)] = {x:d.x, y:d.y}; });
  });
}

// ── Panel ──────────────────────────────────────────────────────────────────
document.getElementById('pcls').addEventListener('click', () => {
  document.getElementById('panel').classList.remove('open');
});

function openPanel(d) {
  const data = d.data;
  const color = dcolor(d);
  const badge = document.getElementById('pbadge');
  const domain = d.depth === 0 ? 'Platform Root' : (DOMAINS[data.domain] || '');
  badge.textContent = domain;
  badge.style.cssText = `background:${color}22;color:${color};border:1px solid ${color}55`;

  document.getElementById('ptitle').textContent = data.name.replace(/\n/g,' ');
  document.getElementById('pdesc').textContent = data.desc || '';

  const chipsEl = document.getElementById('pchips');
  const clbl = document.getElementById('clbl');
  chipsEl.innerHTML = '';
  const allChips = [];
  if (data.tag) allChips.push({text: data.tag, cls: `chip tag-${data.tag}`});
  (data.chips||[]).forEach(c => allChips.push({text:c, cls:'chip'}));
  if (allChips.length) {
    clbl.style.display = '';
    allChips.forEach(({text,cls}) => {
      const s = document.createElement('span');
      s.className = cls; s.textContent = text;
      chipsEl.appendChild(s);
    });
  } else { clbl.style.display='none'; }

  const notesEl = document.getElementById('pnotes');
  const nlink   = document.getElementById('nlink');
  const title   = data.name.replace(/\n/g,' ');
  const key = Object.keys(NOTES_MAP).find(k =>
    title.toLowerCase().includes(k.toLowerCase()) || k.toLowerCase().includes(title.toLowerCase()));
  if (key) { nlink.href = NOTES_MAP[key]; notesEl.style.display=''; }
  else { notesEl.style.display='none'; }

  document.getElementById('panel').classList.add('open');
}

// ── Resize ─────────────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  svg.attr('width', getW()).attr('height', getH());
});

// ── Boot ───────────────────────────────────────────────────────────────────
// Wait for the browser to finish layout before reading dimensions and drawing
requestAnimationFrame(() => {
  svg.attr('width', getW()).attr('height', getH());
  svg.call(zoom.transform, d3.zoomIdentity.translate(getW()/2, getH()/2));
  draw();
});
</script>
</body>
</html>
