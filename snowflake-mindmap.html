<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snowflake — Mind Map</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --border: #2a2d3a;
    --text: #e2e8f0;
    --muted: #8892a4;
    --c0: #4a90d9;
    --c1: #e8834a;
    --c2: #7ac47a;
    --c3: #c47ad4;
    --c4: #e8c84a;
    --c5: #4ac4c4;
    --c6: #e84a6e;
    --c7: #475569;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; overflow: hidden; }

  #header {
    position: fixed; top: 0; left: 0; right: 0; height: 52px;
    background: var(--surface); border-bottom: 1px solid var(--border);
    display: flex; align-items: center; padding: 0 20px; gap: 12px; z-index: 100;
  }
  #header h1 { font-size: 16px; font-weight: 600; color: var(--text); }
  #header .subtitle { font-size: 12px; color: var(--muted); }
  #legend { display: flex; gap: 12px; margin-left: auto; flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--muted); }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; }

  #canvas { position: fixed; top: 52px; left: 0; right: 0; bottom: 0; }
  svg { width: 100%; height: 100%; }

  /* Priority badges */
  .badge-critical { fill: #ef4444; }
  .badge-quick    { fill: #f59e0b; }
  .badge-new      { fill: #10b981; }
  .badge-skip     { fill: #475569; }

  /* Nodes */
  .node circle { stroke-width: 2; cursor: pointer; transition: r 0.15s; }
  .node circle:hover { stroke-width: 3; filter: brightness(1.3); }
  .node.root circle { stroke-width: 3; }
  .node text { pointer-events: none; user-select: none; }

  /* Links */
  .link { stroke: #2a2d3a; stroke-opacity: 0.6; stroke-width: 1.5; fill: none; }

  /* Panel */
  #panel {
    position: fixed; right: 0; top: 52px; bottom: 0; width: 340px;
    background: var(--surface); border-left: 1px solid var(--border);
    overflow-y: auto; padding: 20px; display: none; z-index: 50;
  }
  #panel.open { display: block; }
  #panel-close {
    position: absolute; top: 12px; right: 14px;
    background: none; border: none; color: var(--muted); font-size: 20px; cursor: pointer; line-height: 1;
  }
  #panel-close:hover { color: var(--text); }
  #panel-domain { font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 6px; }
  #panel-title { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
  #panel-priority { display: inline-block; font-size: 10px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; padding: 2px 8px; border-radius: 4px; margin-bottom: 14px; }
  .pri-critical { background: #7f1d1d; color: #fca5a5; }
  .pri-quick    { background: #78350f; color: #fcd34d; }
  .pri-new      { background: #064e3b; color: #6ee7b7; }
  .pri-skip     { background: #1e293b; color: #94a3b8; }
  #panel-desc { font-size: 14px; color: var(--muted); line-height: 1.6; margin-bottom: 16px; }
  #panel-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 16px; }
  .chip { background: #1e2535; border: 1px solid var(--border); border-radius: 6px; padding: 3px 10px; font-size: 12px; color: #94a3b8; font-family: monospace; }
  #panel-links { margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); display: flex; flex-direction: column; gap: 8px; }
  #panel-links a { display: inline-flex; align-items: center; gap: 6px; font-size: 13px; font-weight: 500; text-decoration: none; }
  #panel-links a:hover { text-decoration: underline; }
  #panel-section-link { color: #60a5fa; }
  #panel-notes-link   { color: #4ade80; }

  /* Controls */
  #controls {
    position: fixed; bottom: 16px; left: 16px;
    display: flex; gap: 8px; z-index: 100;
  }
  .ctrl-btn {
    background: var(--surface); border: 1px solid var(--border); color: var(--text);
    width: 32px; height: 32px; border-radius: 8px; cursor: pointer; font-size: 16px;
    display: flex; align-items: center; justify-content: center;
  }
  .ctrl-btn:hover { background: #252836; }

  #search-wrap {
    position: fixed; bottom: 16px; left: 120px; z-index: 100;
  }
  #search {
    background: var(--surface); border: 1px solid var(--border); color: var(--text);
    padding: 6px 12px; border-radius: 8px; font-size: 13px; width: 200px; outline: none;
  }
  #search::placeholder { color: var(--muted); }
  #search:focus { border-color: #4a6fa5; }

  .node.dimmed circle { opacity: 0.15; }
  .node.dimmed text { opacity: 0.15; }
  .link.dimmed { opacity: 0.05; }
</style>
</head>
<body>

<div id="header">
  <h1>Snowflake</h1>
  <span class="subtitle">SA Mind Map</span>
  <div id="legend"></div>
</div>

<div id="canvas"><svg id="svg"></svg></div>

<div id="panel">
  <button id="panel-close" onclick="closePanel()">×</button>
  <div id="panel-domain"></div>
  <div id="panel-title"></div>
  <div id="panel-priority"></div>
  <div id="panel-desc"></div>
  <div id="panel-chips"></div>
  <div id="panel-links">
    <a id="panel-section-link" href="#" target="_blank" style="display:none">📖 Read Course Section</a>
    <a id="panel-notes-link"   href="#" target="_blank" style="display:none">📋 SA Quick Reference Card</a>
  </div>
</div>

<div id="controls">
  <button class="ctrl-btn" onclick="zoomIn()" title="Zoom in">+</button>
  <button class="ctrl-btn" onclick="zoomOut()" title="Zoom out">−</button>
  <button class="ctrl-btn" onclick="resetZoom()" title="Reset">⌖</button>
</div>
<div id="search-wrap">
  <input id="search" type="text" placeholder="Search nodes…" oninput="onSearch(this.value)">
</div>

<script>
// ── Data ──────────────────────────────────────────────────────────────────────
const NOTES_MAP = {
  'Snowflake Architecture and Core Components': 'snowflake/notes/notes_section_01_snowflake_architecture_and_core_components/',
  'Data Storage and Semi-Structured Data Handling': 'snowflake/notes/notes_section_02_data_storage_and_semistructured_data_handling/',
  'Virtual Warehouse Management and Scaling': 'snowflake/notes/notes_section_03_virtual_warehouse_management_and_scaling/',
  'Data Ingestion Techniques and Snowpipe': 'snowflake/notes/notes_section_04_data_ingestion_techniques_and_snowpipe/',
  'Time Travel, Fail-safe, and Zero-Copy Cloning': 'snowflake/notes/notes_section_05_time_travel_failsafe_and_zerocopy_cloning/',
  'Security, Identity, and Access Control': 'snowflake/notes/notes_section_06_security_identity_and_access_control/',
  'Data Sharing and the Snowflake Marketplace': 'snowflake/notes/notes_section_07_data_sharing_and_the_snowflake_marketplace/',
  'Snowpark and Programmable Data Engineering': 'snowflake/notes/notes_section_08_snowpark_and_programmable_data_engineering/',
  'Query Optimization and Performance Tuning': 'snowflake/notes/notes_section_09_query_optimization_and_performance_tuning/',
  'Monitoring, Auditing, and Operations': 'snowflake/notes/notes_section_10_monitoring_auditing_and_operations/',
  'Cost Management and Billing Optimization': 'snowflake/notes/notes_section_11_cost_management_and_billing_optimization/',
  'Migration and Adoption Strategies': 'snowflake/notes/notes_section_12_migration_and_adoption_strategies/',
  'Snowflake Use Cases and Competitive Positioning': 'snowflake/notes/notes_section_13_snowflake_use_cases_and_competitive_positioning/',
  'Certification Exam Preparation': 'snowflake/notes/notes_section_14_certification_exam_preparation/'
};
const SECTIONS_MAP = {
  "Snowflake Architecture and Core Components": "snowflake/section_01_snowflake_architecture_and_core_components/",
  "Data Storage and Semi-Structured Data Handling": "snowflake/section_02_data_storage_and_semistructured_data_handling/",
  "Virtual Warehouse Management and Scaling": "snowflake/section_03_virtual_warehouse_management_and_scaling/",
  "Data Ingestion Techniques and Snowpipe": "snowflake/section_04_data_ingestion_techniques_and_snowpipe/",
  "Time Travel, Fail-safe, and Zero-Copy Cloning": "snowflake/section_05_time_travel_failsafe_and_zerocopy_cloning/",
  "Security, Identity, and Access Control": "snowflake/section_06_security_identity_and_access_control/",
  "Data Sharing and the Snowflake Marketplace": "snowflake/section_07_data_sharing_and_the_snowflake_marketplace/",
  "Snowpark and Programmable Data Engineering": "snowflake/section_08_snowpark_and_programmable_data_engineering/",
  "Query Optimization and Performance Tuning": "snowflake/section_09_query_optimization_and_performance_tuning/",
  "Monitoring, Auditing, and Operations": "snowflake/section_10_monitoring_auditing_and_operations/",
  "Cost Management and Billing Optimization": "snowflake/section_11_cost_management_and_billing_optimization/",
  "Migration and Adoption Strategies": "snowflake/section_12_migration_and_adoption_strategies/",
  "Snowflake Use Cases and Competitive Positioning": "snowflake/section_13_snowflake_use_cases_and_competitive_positioning/",
  "Certification Exam Preparation": "snowflake/section_14_certification_exam_preparation/"
};

const RAW = {
  "title": "Snowflake Solution Architect",
  "domains": [
    "Core Architecture",
    "Security & Identity",
    "Cost & Billing",
    "Migration & Adoption",
    "Monitoring & Operations",
    "Data Ingestion Techniques",
    "Query Optimization"
  ],
  "colors": [
    "#4a90d9",
    "#e8834a",
    "#7ac47a",
    "#c47ad4",
    "#e8c84a",
    "#4ac4c4",
    "#e84a6e"
  ],
  "children": [
    {
      "name": "Core Architecture",
      "nodes": [
        {
          "name": "Snowflake Cloud Services",
          "desc": "Cloud-based architecture allows seamless scaling and performance tuning. Customers care because it ensures reliable, scalable data storage and processing.",
          "chips": [
            "cloud",
            "architecture",
            "scalability"
          ],
          "priority": "critical",
          "section_url": "snowflake/section_01_snowflake_architecture_and_core_components/"
        },
        {
          "name": "Data Sharing Features",
          "desc": "Facilitates secure sharing of data across organizations. Important for customers looking to collaborate without exposing raw data.",
          "chips": [
            "data sharing",
            "collaboration"
          ],
          "priority": "quick",
          "section_url": "snowflake/section_07_data_sharing_and_the_snowflake_marketplace/"
        },
        {
          "name": "Virtual Warehouses",
          "desc": "Manages query performance and resource allocation efficiently. Crucial for customers needing optimized database operations.",
          "chips": [
            "performance tuning",
            "resource management"
          ],
          "priority": "critical",
          "section_url": "snowflake/section_03_virtual_warehouse_management_and_scaling/"
        }
      ]
    },
    {
      "name": "Security & Identity",
      "nodes": [
        {
          "name": "User Authentication Methods",
          "desc": "Supports various authentication mechanisms including OAuth. Important for customers prioritizing security and compliance.",
          "chips": [
            "authentication",
            "security"
          ],
          "priority": "critical",
          "section_url": "snowflake/section_06_security_identity_and_access_control/"
        },
        {
          "name": "Role-Based Access Control (RBAC)",
          "desc": "Enforces granular access control to data resources. Customers care about RBAC for securing and managing access effectively.",
          "chips": [
            "access control",
            "security"
          ],
          "priority": "critical",
          "section_url": "snowflake/section_06_security_identity_and_access_control/"
        }
      ]
    },
    {
      "name": "Cost & Billing",
      "nodes": [
        {
          "name": "Billing Models",
          "desc": "Provides flexible pricing based on usage and performance. Customers are interested in optimizing their cloud spending.",
          "chips": [
            "pricing",
            "billing models"
          ],
          "priority": "critical",
          "section_url": "snowflake/section_11_cost_management_and_billing_optimization/"
        },
        {
          "name": "Cost Management Tools",
          "desc": "Includes various tools to monitor, track and reduce costs. Valuable for customers aiming to manage cloud expenses effectively.",
          "chips": [
            "cost reduction",
            "monitoring"
          ],
          "priority": "quick",
          "section_url": "snowflake/section_11_cost_management_and_billing_optimization/"
        }
      ]
    },
    {
      "name": "Migration & Adoption",
      "nodes": [
        {
          "name": "Data Migration Strategies",
          "desc": "Guides the process of moving data to Snowflake. Customers need this for successful transition from traditional databases.",
          "chips": [
            "migration",
            "strategies"
          ],
          "priority": "critical",
          "section_url": "snowflake/section_12_migration_and_adoption_strategies/"
        },
        {
          "name": "Cloud Adoption Frameworks",
          "desc": "Provides best practices and guidelines for cloud adoption. Useful for customers looking to leverage the benefits of Snowflake.",
          "chips": [
            "cloud",
            "adoption"
          ],
          "priority": "quick",
          "section_url": "snowflake/section_13_snowflake_use_cases_and_competitive_positioning/"
        }
      ]
    },
    {
      "name": "Monitoring & Operations",
      "nodes": [
        {
          "name": "Snowsight Interface",
          "desc": "Provides a user-friendly interface for monitoring and managing Snowflake resources. Important for customers who need efficient operational oversight.",
          "chips": [
            "user interface",
            "monitoring"
          ],
          "priority": "critical",
          "section_url": "snowflake/section_10_monitoring_auditing_and_operations/"
        },
        {
          "name": "Audit Logs and Tracing",
          "desc": "Tracks user activities and system events to ensure compliance. Customers care about these features for security audits and regulatory adherence.",
          "chips": [
            "audit",
            "compliance"
          ],
          "priority": "critical",
          "section_url": "snowflake/section_10_monitoring_auditing_and_operations/"
        }
      ]
    },
    {
      "name": "Data Ingestion Techniques",
      "nodes": [
        {
          "name": "Snowpipe for Real-time Streaming",
          "desc": "Enables real-time data ingestion and processing. Customers are interested in leveraging Snowflake's capabilities for streaming analytics.",
          "chips": [
            "real time",
            "streaming"
          ],
          "priority": "critical",
          "section_url": "snowflake/section_04_data_ingestion_techniques_and_snowpipe/"
        },
        {
          "name": "Cloud Storage Integration",
          "desc": "Simplifies data loading from cloud storage solutions. Customers care about seamless integration to streamline their workflows.",
          "chips": [
            "integration",
            "storage"
          ],
          "priority": "quick",
          "section_url": "snowflake/section_13_snowflake_use_cases_and_competitive_positioning/"
        }
      ]
    },
    {
      "name": "Query Optimization",
      "nodes": [
        {
          "name": "SQL Best Practices",
          "desc": "Optimizes queries for better performance and efficiency. Customers seek this knowledge to enhance their database operations.",
          "chips": [
            "performance",
            "optimization"
          ],
          "priority": "critical",
          "section_url": "snowflake/section_09_query_optimization_and_performance_tuning/"
        },
        {
          "name": "Index Management Techniques",
          "desc": "Improves query response times by managing indexes effectively. Important for customers aiming to optimize their database performance.",
          "chips": [
            "indexing",
            "performance"
          ],
          "priority": "quick",
          "section_url": "snowflake/section_09_query_optimization_and_performance_tuning/"
        }
      ]
    }
  ]
};

// ── Build flat node/link arrays ───────────────────────────────────────────────
const DOMAINS = RAW.domains;
const COLORS  = RAW.colors;

// Build legend
const legend = document.getElementById('legend');
DOMAINS.forEach((d, i) => {
  const item = document.createElement('div');
  item.className = 'legend-item';
  item.innerHTML = `<div class="legend-dot" style="background:${COLORS[i]}"></div>${d}`;
  legend.appendChild(item);
});

const nodes = [];
const links = [];

// root node
nodes.push({ id: 'root', label: RAW.title, type: 'root', domain: -1, r: 28 });

RAW.children.forEach((domain, di) => {
  const domainId = `domain_${di}`;
  nodes.push({ id: domainId, label: domain.name, type: 'domain', domain: di, r: 18 });
  links.push({ source: 'root', target: domainId });

  (domain.nodes || []).forEach((n, ni) => {
    const nid = `${domainId}_${ni}`;
    nodes.push({
      id: nid, label: n.name, type: 'node', domain: di, r: 10,
      desc: n.desc || '', chips: n.chips || [], priority: n.priority || 'quick',
      domainName: domain.name, section_url: n.section_url || null,
    });
    links.push({ source: domainId, target: nid });
  });
});

// ── D3 Setup ──────────────────────────────────────────────────────────────────
const svg  = d3.select('#svg');
const root = svg.append('g').attr('class', 'root-g');

const zoom = d3.zoom()
  .scaleExtent([0.2, 4])
  .on('zoom', e => root.attr('transform', e.transform));
svg.call(zoom);

function zoomIn()    { svg.transition().call(zoom.scaleBy, 1.3); }
function zoomOut()   { svg.transition().call(zoom.scaleBy, 0.77); }
function resetZoom() { svg.transition().call(zoom.transform, d3.zoomIdentity); }

const W = () => document.getElementById('canvas').offsetWidth;
const H = () => document.getElementById('canvas').offsetHeight;

// Simulation
const sim = d3.forceSimulation(nodes)
  .force('link', d3.forceLink(links).id(d => d.id).distance(d => {
    if (d.target.type === 'domain') return 160;
    return 90;
  }).strength(0.6))
  .force('charge', d3.forceManyBody().strength(-350))
  .force('center', d3.forceCenter(W() / 2, H() / 2))
  .force('collision', d3.forceCollide(d => d.r + 14));

// Links
const linkSel = root.append('g').selectAll('line')
  .data(links).join('line').attr('class', 'link');

// Nodes
const nodeSel = root.append('g').selectAll('g')
  .data(nodes).join('g')
  .attr('class', d => `node ${d.type}`)
  .call(d3.drag()
    .on('start', (e, d) => { if (!e.active) sim.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
    .on('drag',  (e, d) => { d.fx = e.x; d.fy = e.y; })
    .on('end',   (e, d) => { if (!e.active) sim.alphaTarget(0); d.fx = null; d.fy = null; })
  )
  .on('click', (e, d) => { e.stopPropagation(); openPanel(d); });

nodeSel.append('circle')
  .attr('r', d => d.r)
  .attr('fill', d => d.domain >= 0 ? COLORS[d.domain] : '#4a6fa5')
  .attr('fill-opacity', d => d.type === 'node' ? 0.85 : 1)
  .attr('stroke', d => d.domain >= 0 ? COLORS[d.domain] : '#6b8cc5')
  .attr('stroke-opacity', 0.6);

// Priority ring for leaf nodes
nodeSel.filter(d => d.type === 'node').append('circle')
  .attr('r', d => d.r + 3)
  .attr('fill', 'none')
  .attr('stroke-width', 2)
  .attr('stroke', d => {
    const p = d.priority;
    if (p === 'critical') return '#ef4444';
    if (p === 'new')      return '#10b981';
    if (p === 'skip')     return '#475569';
    return 'transparent';
  });

nodeSel.append('text')
  .attr('text-anchor', 'middle')
  .attr('dy', d => d.type === 'node' ? d.r + 13 : 5)
  .attr('font-size', d => d.type === 'root' ? 13 : d.type === 'domain' ? 12 : 10)
  .attr('font-weight', d => d.type === 'root' ? 700 : d.type === 'domain' ? 600 : 400)
  .attr('fill', d => d.type === 'node' ? '#94a3b8' : '#e2e8f0')
  .text(d => d.label);

sim.on('tick', () => {
  linkSel
    .attr('x1', d => d.source.x).attr('y1', d => d.source.y)
    .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
  nodeSel.attr('transform', d => `translate(${d.x},${d.y})`);
});

svg.on('click', closePanel);

// ── Panel ─────────────────────────────────────────────────────────────────────
function openPanel(d) {
  if (d.type === 'root' || d.type === 'domain') return;
  const panel = document.getElementById('panel');
  panel.classList.add('open');

  document.getElementById('panel-domain').textContent  = d.domainName;
  document.getElementById('panel-domain').style.color  = COLORS[d.domain];
  document.getElementById('panel-title').textContent   = d.label;

  const pri = document.getElementById('panel-priority');
  pri.textContent  = d.priority;
  pri.className    = `pri-${d.priority}`;

  document.getElementById('panel-desc').textContent = d.desc;

  const chipsEl = document.getElementById('panel-chips');
  chipsEl.innerHTML = (d.chips || []).map(c => `<span class="chip">${c}</span>`).join('');

  // Read Section link — from section_url baked into node data
  const sectionLink = document.getElementById('panel-section-link');
  if (d.section_url) {
    sectionLink.href = d.section_url;
    sectionLink.style.display = 'inline-flex';
  } else {
    sectionLink.style.display = 'none';
  }

  // SA Notes link — case-insensitive substring match against NOTES_MAP
  const notesLink = document.getElementById('panel-notes-link');
  const matchKey = Object.keys(NOTES_MAP).find(k =>
    k.toLowerCase().includes(d.label.toLowerCase()) ||
    d.label.toLowerCase().includes(k.toLowerCase())
  );
  if (matchKey) {
    notesLink.href = NOTES_MAP[matchKey];
    notesLink.style.display = 'inline-flex';
  } else {
    notesLink.style.display = 'none';
  }
}

function closePanel() {
  document.getElementById('panel').classList.remove('open');
  clearDim();
}

// ── Search / dim ──────────────────────────────────────────────────────────────
function onSearch(q) {
  if (!q) { clearDim(); return; }
  const lq = q.toLowerCase();
  nodeSel.classed('dimmed', d => !d.label.toLowerCase().includes(lq));
  linkSel.classed('dimmed', d => {
    return !d.source.label?.toLowerCase().includes(lq) &&
           !d.target.label?.toLowerCase().includes(lq);
  });
}

function clearDim() {
  nodeSel.classed('dimmed', false);
  linkSel.classed('dimmed', false);
}

// Resize
window.addEventListener('resize', () => {
  sim.force('center', d3.forceCenter(W() / 2, H() / 2)).alpha(0.3).restart();
});
</script>
</body>
</html>
